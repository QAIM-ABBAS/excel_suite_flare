name = "excel-suite-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "excel-suite-db"
database_id = "0881424a-39a6-470b-93f3-7ec314aa97b2"

# KV namespace for temporary file storage
[[kv_namespaces]]
binding = "KV"
id = "2fe579f8c40a4b52855cf06e4e66c014"

# Environment variables
[vars]
ENVIRONMENT = "production"
